<!doctype html><html lang="vi"><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Be Vietnam Pro',sans-serif;}
  html,body{width:900px;height:1200px;}
  body{zoom:.55;}
  .stage{width:900px;height:1200px;position:relative;overflow:hidden;
    background:linear-gradient(160deg,#7A2E3B 0%,#A8444F 38%,#C66B62 70%,#E59A6E 100%);}
  .deco1{position:absolute;top:-180px;right:-160px;width:520px;height:520px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,209,150,.45),rgba(255,209,150,0) 70%);}
  .deco2{position:absolute;bottom:-220px;left:-160px;width:520px;height:520px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.12),rgba(255,255,255,0) 70%);}
  .wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:64px 64px 0;}
  .top{display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:12px;color:#fff;font-weight:800;font-size:30px;letter-spacing:1px;}
  .brand .dot{width:42px;height:42px;border-radius:11px;background:#fff;color:#A8444F;display:grid;place-items:center;font-size:24px;font-weight:900;}
  .badge{background:#FFD36B;color:#7A2E3B;font-weight:900;font-size:22px;padding:10px 22px;border-radius:30px;box-shadow:0 8px 18px rgba(0,0,0,.18);}
  .kicker{margin-top:60px;color:#FFD9B8;font-weight:700;font-size:26px;letter-spacing:4px;text-transform:uppercase;}
  .title{margin-top:14px;font-family:'Playfair Display',serif;color:#fff;font-weight:900;font-size:92px;line-height:1.02;letter-spacing:.5px;}
  .title .hl{color:#FFD36B;}
  .sub{margin-top:22px;color:#FFE7D6;font-weight:600;font-size:34px;line-height:1.35;max-width:640px;}
  .bullets{margin-top:30px;display:flex;flex-direction:column;gap:16px;}
  .b{display:flex;align-items:center;gap:16px;color:#fff;font-size:27px;font-weight:600;}
  .b .ic{flex:0 0 40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:22px;color:#FFD36B;font-weight:900;}
  .author{margin-top:auto;display:flex;align-items:center;gap:24px;background:rgba(255,255,255,.10);border-top:1px solid rgba(255,255,255,.25);
    padding:30px 0 36px;}
  .author .ph{flex:0 0 132px;height:132px;border-radius:50%;overflow:hidden;border:4px solid #FFD36B;background:#fff;}
  .author .ph img{width:100%;height:100%;object-fit:cover;display:block;}
  .author .ph .emo{width:100%;height:100%;display:grid;place-items:center;font-size:64px;}
  .author .meta .n{color:#fff;font-weight:800;font-size:34px;}
  .author .meta .r{color:#FFD9B8;font-weight:600;font-size:24px;margin-top:4px;}
</style></head>
<body>
<div class="stage">
  <div class="deco1"></div><div class="deco2"></div>
  <div class="wrap">
    <div class="top">
      <div class="brand"><span class="dot">B</span> BA12DAYS</div>
      <div class="badge">EBOOK MIỄN PHÍ</div>
    </div>

    <div class="kicker">Cẩm nang chăm da</div>
    <div class="title">LÀM ĐẸP DA<br>TẠI NHÀ</div>
    <div class="sub">Bí quyết <span style="color:#FFD36B;font-weight:800">chống lão hóa tự nhiên</span>, giữ làn da sáng khỏe mỗi ngày</div>

    <div class="bullets">
      <div class="b"><span class="ic">✓</span> Chăm da đúng cách ngay tại nhà</div>
      <div class="b"><span class="ic">✓</span> Ngăn lão hóa, mờ sạm sớm</div>
      <div class="b"><span class="ic">✓</span> Routine đơn giản, dễ theo</div>
    </div>

    <div class="author">
      <div class="ph"><img src="https://raw.githubusercontent.com/goldhomebeauty-creator/ba12days-assets/main/love-the-sun-founder-2.jpg" onerror="this.parentNode.innerHTML='<span class=&quot;emo&quot;>👩</span>'"></div>
      <div class="meta"><div class="n">Lê Thu Giang</div><div class="r">Founder BA12DAYS</div></div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
window.addEventListener('load',function(){setTimeout(function(){
 html2canvas(document.querySelector('.stage'),{scale:2,useCORS:true,backgroundColor:null,logging:false}).then(function(c){
  c.toBlob(function(b){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ebook-cover.png';document.body.appendChild(a);a.click();},'image/png');
 });
},3000);});
</script>
</body></html>
